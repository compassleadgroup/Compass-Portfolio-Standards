name: Merge When Green

# Three-gate autonomous merge pipeline for site repo PRs.
# Gate 1: compliance greps. Gate 2: build. Gate 3: Claude compliance review.
# A PR that passes every gate merges itself. There is no manual category.
#
# Canonical copy: sync/merge-when-green.yml in Compass-Portfolio-Standards.
# The Standards Sync action distributes it to .github/workflows/ in every
# site repo. Do not edit this file in a site repo, edit the standards repo.
#
# Standards-sync PRs (head branch standards-sync, only canonical rule files
# changed) skip Gates 1 and 3: that text was already reviewed and merged in
# the standards repo, and the rule files themselves name the banned phrases
# the greps look for. They still must pass Gate 2 before merging.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: merge-when-green-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  merge-when-green:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > "$RUNNER_TEMP/changed.txt"
          echo "Changed files:"
          cat "$RUNNER_TEMP/changed.txt"
          SYNC_ONLY=false
          if [ "$HEAD_REF" = "standards-sync" ] && [ -s "$RUNNER_TEMP/changed.txt" ]; then
            SYNC_ONLY=true
            while IFS= read -r F; do
              case "$F" in
                COMPLIANCE_STANDARDS.md|FORBIDDEN_LANGUAGE.md|SCHEMA_WHITELIST.md|BUILD_PLAYBOOK.md|.github/workflows/merge-when-green.yml) ;;
                *) SYNC_ONLY=false ;;
              esac
            done < "$RUNNER_TEMP/changed.txt"
          fi
          echo "sync_only=$SYNC_ONLY" >> "$GITHUB_OUTPUT"
          echo "Standards-sync fast path: $SYNC_ONLY"

      - name: Gate 1, compliance greps
        if: steps.classify.outputs.sync_only != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          FAIL=0

          for F in COMPLIANCE_STANDARDS.md FORBIDDEN_LANGUAGE.md SCHEMA_WHITELIST.md BUILD_PLAYBOOK.md .github/workflows/merge-when-green.yml; do
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "$F" | grep -q .; then
              echo "::error file=$F::Canonical file changed outside a standards-sync PR. Edit Compass-Portfolio-Standards instead."
              FAIL=1
            fi
          done

          git diff "$BASE_SHA" "$HEAD_SHA" -- . \
            ':(exclude)COMPLIANCE_STANDARDS.md' \
            ':(exclude)FORBIDDEN_LANGUAGE.md' \
            ':(exclude)SCHEMA_WHITELIST.md' \
            ':(exclude)BUILD_PLAYBOOK.md' \
            | grep '^+' | grep -v '^+++' > "$RUNNER_TEMP/added.txt" || true

          EMDASH=$(printf '\342\200\224')
          if grep -n "$EMDASH" "$RUNNER_TEMP/added.txt"; then
            echo "::error::Em dash character found in added lines. See matches above."
            FAIL=1
          fi

          if [ -f FORBIDDEN_LANGUAGE.md ]; then
            sed -n 's/^- \[ \] //p' FORBIDDEN_LANGUAGE.md > "$RUNNER_TEMP/phrases.txt"
            while IFS= read -r PHRASE; do
              [ -z "$PHRASE" ] && continue
              if grep -i -F -n -- "$PHRASE" "$RUNNER_TEMP/added.txt"; then
                echo "::error::Forbidden phrase in added lines: $PHRASE"
                FAIL=1
              fi
            done < "$RUNNER_TEMP/phrases.txt"
          else
            echo "::error::FORBIDDEN_LANGUAGE.md is missing from this repo. Run the Standards Sync workflow first."
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "Gate 1 passed."

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Gate 2, build
        run: |
          npm ci
          npm run build

      - name: Gate 3, Claude compliance review
        if: steps.classify.outputs.sync_only != 'true'
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["PASS","FAIL"]},"findings":{"type":"string"}},"required":["verdict","findings"]}'
          prompt: |
            This is pull request #${{ github.event.pull_request.number }} of ${{ github.repository }}.

            You are the final compliance reviewer for a rank-and-rent site operated by Compass Camper LLC. Read COMPLIANCE_STANDARDS.md, FORBIDDEN_LANGUAGE.md, and SCHEMA_WHITELIST.md in this repo, then review only the files changed in this PR against them. Check:
            1. Net impression: could a reasonable consumer reading the changed copy conclude this company performs the work? If yes, FAIL.
            2. Forbidden language in context, not just exact strings: any wording that implies vetting, a contractor network, screening, tenure, or first-person performance of work.
            3. Schema: only Organization, ProfessionalService, Service, FAQPage, BreadcrumbList. Any Review, AggregateRating, Rating, LocalBusiness, or contractor-category schema is FAIL. Service descriptions must say the site connects homeowners with licensed contractors.
            4. YMYL and regulatory claims: any legal, health, safety, code, permit, penalty, or cost-of-noncompliance claim in the diff must cite a primary source already present in the content. Uncited regulatory claims are FAIL.
            5. Trust signals: any testimonial, review, named team member, tenure claim, award, badge, or jobs counter is FAIL pre-tenant.
            6. Forms: any new or changed form must have the TCPA consent block above the submit button, not pre-checked, with a working /privacy link.
            7. Em dashes anywhere in the diff are FAIL.
            Do not flag issues outside the changed files. Do not flag style preferences. End your review with exactly one line: VERDICT: PASS or VERDICT: FAIL followed by a numbered list of reasons and file locations.

            Deliver the review through the structured output: set "verdict" to PASS or FAIL, matching your verdict line, and put the findings with file locations in "findings".

      - name: Post verdict and merge when green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT: ${{ steps.review.outputs.structured_output }}
          SYNC_ONLY: ${{ steps.classify.outputs.sync_only }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$SYNC_ONLY" = "true" ]; then
            BODY=$(printf '## Standards sync: merging on green build\n\nCanonical rule files copied from Compass-Portfolio-Standards. Build passed. Content gates do not re-review canonical text; it was reviewed where it was merged.')
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
            gh pr merge --squash --match-head-commit "$HEAD_SHA" "$PR" --repo "$REPO"
            echo "Merged."
            exit 0
          fi

          if [ -z "$OUT" ]; then
            echo "::error::Review step produced no output. Check the Claude review step logs above."
            exit 1
          fi
          VERDICT=$(echo "$OUT" | jq -r '.verdict')
          FINDINGS=$(echo "$OUT" | jq -r '.findings')
          echo "Verdict: $VERDICT"
          BODY=$(printf '## Compliance review: %s\n\n%s\n' "$VERDICT" "$FINDINGS")
          gh pr comment "$PR" --repo "$REPO" --edit-last --body "$BODY" 2>/dev/null \
            || gh pr comment "$PR" --repo "$REPO" --body "$BODY"

          if [ "$VERDICT" = "PASS" ]; then
            gh pr merge --squash --match-head-commit "$HEAD_SHA" "$PR" --repo "$REPO"
            echo "Merged."
          else
            echo "::error::Compliance review verdict: FAIL. The PR stays open. See the PR comment for reasons."
            exit 1
          fi
